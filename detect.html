<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find My PM Fit — PMReady</title>
  <meta name="description"
    content="10-minute state detection quiz. Find your PM archetype, your starting point, and your personalised roadmap.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .detect-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .detect-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8, 8, 26, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: var(--space-4) 0;
    }

    .detect-header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .detect-logo {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--purple-400), var(--cyan-500));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .quiz-container {
      flex: 1;
      padding: var(--space-10) 0 var(--space-20);
    }

    .question-header {
      margin-bottom: var(--space-8);
    }

    .layer-tag {
      display: inline-block;
      margin-bottom: var(--space-3);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .multi-hint {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: var(--space-1) var(--space-3);
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.2);
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      color: var(--purple-400);
      margin-bottom: var(--space-4);
    }
  </style>
</head>

<body>
  <div class="detect-page">

    <!-- Header -->
    <header class="detect-header">
      <div class="container detect-header-inner">
        <a href="index.html" class="detect-logo">PMReady</a>
        <div style="display:flex; align-items:center; gap:var(--space-4);">
          <div class="quiz-progress" style="width:180px;" role="progressbar" aria-valuenow="0" aria-valuemin="0"
            aria-valuemax="100" id="progress-bar-container">
            <div class="quiz-progress-fill" id="progress-bar" style="width:0%"></div>
          </div>
          <span class="step-counter" id="step-counter">1 of 9</span>
        </div>
      </div>
    </header>

    <!-- Quiz Body -->
    <main class="quiz-container">
      <div class="container-narrow">
        <div id="quiz-steps">
          <!-- Steps injected by JS -->
        </div>
      </div>
    </main>

  </div>

  <script type="module" src="js/data.js"></script>
  <script type="module">
    // ── State ─────────────────────────────────────────────
    window.answers = {};
    window.currentStep = 0;
    window.totalSteps = QUIZ_QUESTIONS.length;

    // ── Render ────────────────────────────────────────────
    window.renderQuiz = function() {
      const container = document.getElementById('quiz-steps');
      container.innerHTML = QUIZ_QUESTIONS.map((q, i) => renderStep(q, i)).join('');
      showStep(0);
    }

    window.renderStep = function(q, index) {
      const layerLabels = { 1: 'Layer 1 — Your Journey', 2: 'Layer 2 — Your Profile', 3: 'Layer 3 — Your Target' };
      const isMulti = q.type === 'multi';

      const optionsHTML = q.options.map(opt => `
        <button
          class="option-btn ${isMulti ? 'multi-select' : ''}"
          data-q="${q.id}"
          data-val="${opt.value}"
          id="opt-${q.id}-${opt.value}"
          aria-pressed="false"
          onclick="selectOption(this, '${q.id}', '${opt.value}', ${isMulti})"
        >
          ${isMulti ? '<span class="check-box" aria-hidden="true"></span>' : ''}
          <span class="option-icon" aria-hidden="true">${opt.icon}</span>
          <span class="option-text">
            <span class="option-label">${opt.label}</span>
            ${opt.sub ? `<span class="option-sub">${opt.sub}</span>` : ''}
          </span>
        </button>
      `).join('');

      return `
        <div class="quiz-step" id="step-${index}" role="group" aria-labelledby="q-label-${index}">
          <div class="question-header">
            <span class="layer-tag">${layerLabels[q.layer] || ''}</span>
            ${isMulti ? '<span class="multi-hint">✓ Select all that apply</span>' : ''}
            <h2 class="quiz-question" id="q-label-${index}">${q.question}</h2>
            ${q.hint ? `<p class="quiz-hint">${q.hint}</p>` : ''}
          </div>
          <div class="options-list" role="${isMulti ? 'group' : 'radiogroup'}" aria-label="${q.question}">
            ${optionsHTML}
          </div>
          <div class="quiz-nav">
            <button class="btn btn-secondary btn-sm" onclick="prevStep()" ${index === 0 ? 'style="visibility:hidden"' : ''} aria-label="Previous question">
              ← Back
            </button>
            <button class="btn btn-primary btn-sm"
              id="next-btn-${index}"
              onclick="nextStep()"
              disabled
              aria-label="Next question"
            >
              ${index < totalSteps - 1 ? 'Continue →' : 'See My Results →'}
            </button>
          </div>
        </div>
      `;
    }

    window.showStep = function(index) {
      document.querySelectorAll('.quiz-step').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
      currentStep = index;
      const pct = Math.round((index / totalSteps) * 100);
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-bar-container').setAttribute('aria-valuenow', pct);
      document.getElementById('step-counter').textContent = `${index + 1} of ${totalSteps}`;

      // Restore previous selection UI if re-visiting
      const q = QUIZ_QUESTIONS[index];
      if (answers[q.id]) {
        const vals = Array.isArray(answers[q.id]) ? answers[q.id] : [answers[q.id]];
        vals.forEach(v => {
          const btn = document.querySelector(`[data-q="${q.id}"][data-val="${v}"]`);
          if (btn) markSelected(btn, q.type === 'multi');
        });
        document.getElementById(`next-btn-${index}`).disabled = false;
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.markSelected = function(btn, isMulti) {
      btn.classList.add('selected');
      btn.setAttribute('aria-pressed', 'true');
    }

    window.selectOption = function(btn, qId, value, isMulti) {
      if (isMulti) {
        // Toggle multi-select
        if (!answers[qId]) answers[qId] = [];
        const idx = answers[qId].indexOf(value);
        if (idx >= 0) {
          answers[qId].splice(idx, 1);
          btn.classList.remove('selected');
          btn.setAttribute('aria-pressed', 'false');
        } else {
          answers[qId].push(value);
          btn.classList.add('selected');
          btn.setAttribute('aria-pressed', 'true');
        }
        // "nothing" is exclusive
        if (value === 'nothing') {
          answers[qId] = ['nothing'];
          document.querySelectorAll(`[data-q="${qId}"]`).forEach(b => {
            b.classList.remove('selected');
            b.setAttribute('aria-pressed', 'false');
          });
          btn.classList.add('selected');
          btn.setAttribute('aria-pressed', 'true');
        } else {
          answers[qId] = answers[qId].filter(v => v !== 'nothing');
          const nothingBtn = document.querySelector(`[data-q="${qId}"][data-val="nothing"]`);
          if (nothingBtn) { nothingBtn.classList.remove('selected'); nothingBtn.setAttribute('aria-pressed', 'false'); }
        }
        document.getElementById(`next-btn-${currentStep}`).disabled = answers[qId].length === 0;
      } else {
        // Single select — deselect all, select this
        document.querySelectorAll(`[data-q="${qId}"]`).forEach(b => {
          b.classList.remove('selected');
          b.setAttribute('aria-pressed', 'false');
        });
        btn.classList.add('selected');
        btn.setAttribute('aria-pressed', 'true');
        answers[qId] = value;
        document.getElementById(`next-btn-${currentStep}`).disabled = false;
      }
    }

    window.nextStep = function() {
      if (currentStep < totalSteps - 1) {
        showStep(currentStep + 1);
      } else {
        finishQuiz();
      }
    }

    window.prevStep = function() {
      if (currentStep > 0) showStep(currentStep - 1);
    }

    window.finishQuiz = async function() {
      // Compute archetype
      const result = calculateArchetype(answers);
      const bgId = answers.q3 || 'engineer';
      const experienceLevel = getExperienceLevel(answers);

      // Save to Supabase
      await saveState({
        answers,
        archetype: result.primary,
        secondaryArchetype: result.secondary,
        archetypeScores: result.scores,
        background: bgId,
        experienceLevel,
        simCompleted: 0,
        avgScore: 0,
        readinessState: 'building',
        missionsCompleted: 0,
        weekNumber: 1
      });

      // Navigate to results
      window.location.href = 'results.html';
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const nextBtn = document.getElementById(`next-btn-${currentStep}`);
        if (nextBtn && !nextBtn.disabled) nextBtn.click();
      }
    });

    // Init
    renderQuiz();
  </script>
</body>

</html>
